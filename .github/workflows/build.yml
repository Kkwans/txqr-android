name: Build Android APK (with gomobile)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install gomobile and build AAR
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        gomobile init
        cd decoder
        go mod tidy
        go get -tool golang.org/x/mobile/cmd/gobind
        go mod tidy
        mkdir -p ../app/libs
        gomobile bind -target=android -androidapi 24 -o ../app/libs/txqr.aar ./mobile

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Create debug keystore
      run: |
        # 生成固定的 RSA 密钥
        openssl req -x509 -nodes -days 36500 -newkey rsa:2048 \
          -keyout /tmp/debug.key -out /tmp/debug.crt \
          -subj "/CN=TXQR Debug/OU=Dev/O=Kkwans/L=Shanghai/ST=SH/C=CN" \
          -passout pass:txqr123
        # 转换为 PKCS12 keystore
        openssl pkcs12 -export -in /tmp/debug.crt -inkey /tmp/debug.key \
          -out /tmp/debug.p12 -name txqr -passout pass:txqr123
        # 复制到 app 目录
        mkdir -p app
        cp /tmp/debug.p12 app/debug.p12

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: txqr-reader-debug
        path: app/build/outputs/apk/debug/*.apk
